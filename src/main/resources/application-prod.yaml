
spring:
  datasource:
    url: "${DB_URL:jdbc:postgresql://postgres-db:5432/identity_service}"
    driverClassName: "org.postgresql.Driver"
    username: "${DB_USERNAME:postgres}"
    password: "${DB_PASSWORD:123}"
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: IdentifyService-DB-Pool
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379

jwt:
  signerKey: "${JWT_SIGNERKEY}"
  valid-duration: 20
  refreshable-duration: 40